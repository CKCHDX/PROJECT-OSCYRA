[CRAWLER]
# How many pages to crawl per domain (1-10000)

MAX_PAGES_PER_DOMAIN = 1000

# How many domains to crawl simultaneously (increase for speed)
MAX_CONCURRENT_CRAWLS = 75

# Seconds between requests to same domain (politeness)
# Increased to 1.0 to respect robots.txt and avoid timeouts
CRAWL_DELAY = 1.0

# Timeout for each request in seconds
# Increased to 45s for slower government sites
CRAWL_TIMEOUT = 45

# Maximum depth of crawling (how deep into site structure)
# Increased to 10 for deeper content discovery
MAX_CRAWL_DEPTH = 10


[INDEXER]
# Log progress every N pages during indexing
INDEX_LOG_FREQUENCY = 100

# Enable compression for index files (slower but smaller)
COMPRESS_INDEX = true


[API]
# Port for search API server
API_PORT = 5000

# Enable debug mode (more logging)
DEBUG = true

# Allow CORS from all origins
CORS_ENABLED = true


[SYSTEM]
# Resume from last crawl state if interrupted
RESUME_CRAWLING = false

# Automatically restart server if it crashes
AUTO_RESTART = true

# Clean old logs after N days
LOG_RETENTION_DAYS = 30

# Domains to skip (comma-separated) - unreachable or problematic sites
SKIP_DOMAINS = växjö.se,sverige.se,svenskbygg.se,rikstv.se,rättsmedicinalverket.se

# Max time per domain in seconds (prevents hanging) - 2 minutes
PER_DOMAIN_TIMEOUT = 120
